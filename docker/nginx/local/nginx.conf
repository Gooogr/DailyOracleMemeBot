events {}

http {
    server {
        listen 80;

        # used for S3 API + redirect browsers to 9001 UI endpoint
        # works because of exposed ports 9000 and 9001
        location /minio/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
